name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # позволяет запустить сборку вручную из вкладки Actions
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# если пушнуть несколько раз подряд, доедет последний
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        env:
          # проектный сайт живёт в /<имя-репозитория>/, отсюда base для Vite
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: SPA fallback
        # Pages — статика без сервера: прямой заход на /catalog вернул бы 404.
        # Копия index.html под именем 404.html отдаётся вместо ошибки, и
        # роутер разбирает адрес уже в браузере.
        working-directory: app
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
